# Основные настройки
port 6379
bind 0.0.0.0
protected-mode yes
daemonize no

# Сохранение на диск
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfilename "appendonly.aof"

# Ограничение памяти
maxmemory 256mb
maxmemory-policy allkeys-lru

# Пароль задается через аргумент командной строки, поэтому здесь не нужен
# requirepass будет передан через --requirepass в command