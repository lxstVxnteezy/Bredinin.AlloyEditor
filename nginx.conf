events {
    worker_connections 1024;
}

http {
    # Формат логов с информацией о rate limit
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct="$upstream_connect_time" uht="$upstream_header_time" urt="$upstream_response_time"';

    log_format ratelimit '$remote_addr - $remote_user [$time_local] '
                         '"$request" $status $body_bytes_sent '
                         '"$http_referer" "$http_user_agent" '
                         'limit_req_status=$limit_req_status';

    # Зона для rate limiting: 10 МБ, до 10 запросов в секунду с одного IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Отдельная зона для авторизации (жёстче)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=2r/s;

    # Апстрим с тремя инстансами гейтвея
    upstream gateway_instances {
        # Используем least_conn для балансировки по наименьшему числу соединений
        least_conn;
        
        # Три инстанса гейтвея (названия сервисов из docker-compose)
        server api_gateway1:5030 max_fails=3 fail_timeout=30s;
        server api_gateway2:5030 max_fails=3 fail_timeout=30s;
        server api_gateway3:5030 max_fails=3 fail_timeout=30s;
        
        # Сохранять keep-alive соединения
        keepalive 32;
    }

    server {
        # Слушаем порт 80 на всех интерфейсах
        listen 80;
        listen [::]:80;
        
        # Принимаем все имена (для локальной разработки)
        server_name _;

        # Включаем лог с rate limit статусом
        access_log /var/log/nginx/ratelimit.log ratelimit;
        access_log /var/log/nginx/access.log main;
        error_log /var/log/nginx/error.log warn;

        # === ОСНОВНЫЕ API ===
        # Для всех API запросов
        location /api/ {
            # Rate limiting: 10 запросов в секунду, burst 20
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;  # Too Many Requests
            limit_req_log_level warn;

            # Прокси на гейтвеи
            proxy_pass http://gateway_instances;
            
            # Важные заголовки
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Таймауты
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Буферизация
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # === АВТОРИЗАЦИЯ (отдельный жёсткий лимит) ===
        location /api/identity/login {
            # Rate limiting: 2 запроса в секунду, burst 3
            limit_req zone=auth_limit burst=3 nodelay;
            limit_req_status 429;
            limit_req_log_level warn;

            proxy_pass http://gateway_instances;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # === РЕФРЕШ ТОКЕНА (тоже жёстко) ===
        location /api/identity/refresh-token {
            limit_req zone=auth_limit burst=3 nodelay;
            limit_req_status 429;

            proxy_pass http://gateway_instances;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # === SWAGGER (без жёстких лимитов) ===
        location /swagger/ {
            proxy_pass http://gateway_instances;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # === ЗДОРОВЬЕ (без лимитов) ===
        location /health {
            proxy_pass http://gateway_instances;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            access_log off;
        }

        # === СТАТИКА (если будет) ===
        location /static/ {
            root /usr/share/nginx/html;
            expires 30d;
        }

        # === ДЕФОЛТНЫЙ ЛОКЕЙШН ===
        location / {
            proxy_pass http://gateway_instances;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}